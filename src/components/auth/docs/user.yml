paths:
  /api/v1/users/profile:
    get:
      tags: [Users]
      summary: Get own profile
      description: Returns the authenticated user's profile including their saved addresses.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [Users]
      summary: Update own profile
      description: Updates the authenticated user's first name, last name, or phone number.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              firstName: Jane
              lastName: Smith
              phone: "+254712345678"
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Phone number already in use
          content:
            application/json:
              example: { error: Phone already in use }

  /api/v1/users/delete:
    delete:
      tags: [Users]
      summary: Delete own account
      description: Permanently deletes the authenticated user's account and all associated data.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              example: { message: Account deleted successfully }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/users/addresses:
    get:
      tags: [Users]
      summary: List saved addresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  addresses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Users]
      summary: Add a new address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
            example:
              label: Home
              fullName: Jane Doe
              phone: "+254712345678"
              addressLine1: 123 Kimathi Street
              city: Nairobi
              state: Nairobi
              postalCode: "00100"
              country: Kenya
              isDefault: true
      responses:
        '201':
          description: Address added
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  address: { $ref: '#/components/schemas/Address' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/users/addresses/{id}:
    put:
      tags: [Users]
      summary: Update an address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  address: { $ref: '#/components/schemas/Address' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [Users]
      summary: Delete an address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Address deleted
          content:
            application/json:
              example: { message: Address deleted successfully }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/users/login-history:
    get:
      tags: [Users]
      summary: Get login history
      description: Returns the last 10 login attempts for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Login history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoginHistoryEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Address:
      type: object
      properties:
        id:           { type: string, format: uuid }
        label:        { type: string, example: Home }
        fullName:     { type: string }
        phone:        { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city:         { type: string }
        state:        { type: string }
        postalCode:   { type: string }
        country:      { type: string }
        isDefault:    { type: boolean }

    AddAddressRequest:
      type: object
      required: [fullName, phone, addressLine1, city, state, postalCode]
      properties:
        label:        { type: string }
        fullName:     { type: string }
        phone:        { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city:         { type: string }
        state:        { type: string }
        postalCode:   { type: string }
        country:      { type: string, default: Kenya }
        isDefault:    { type: boolean }

    UpdateAddressRequest:
      type: object
      minProperties: 1
      properties:
        label:        { type: string }
        fullName:     { type: string }
        phone:        { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city:         { type: string }
        state:        { type: string }
        postalCode:   { type: string }
        country:      { type: string }
        isDefault:    { type: boolean }

    UpdateProfileRequest:
      type: object
      minProperties: 1
      properties:
        firstName: { type: string, minLength: 2 }
        lastName:  { type: string, minLength: 2 }
        phone:     { type: string }

    UpdateProfileResponse:
      type: object
      properties:
        message: { type: string }
        user:
          type: object
          properties:
            id:         { type: string, format: uuid }
            firstName:  { type: string }
            lastName:   { type: string }
            email:      { type: string }
            phone:      { type: string }
            role:       { type: string }
            isVerified: { type: boolean }

    ProfileResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:         { type: string, format: uuid }
            firstName:  { type: string }
            lastName:   { type: string }
            email:      { type: string }
            phone:      { type: string }
            role:       { type: string }
            isVerified: { type: boolean }
            addresses:
              type: array
              items:
                $ref: '#/components/schemas/Address'

    LoginHistoryEntry:
      type: object
      properties:
        id:         { type: string, format: uuid }
        ipAddress:  { type: string }
        userAgent:  { type: string }
        status:     { type: string, enum: [success, failed] }
        loginAt:    { type: string, format: date-time }

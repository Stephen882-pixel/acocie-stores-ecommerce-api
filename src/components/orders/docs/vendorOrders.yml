paths:
  /api/v1/vendor/orders:
    get:
      tags: [Vendor — Orders]
      summary: Get vendor orders
      description: Returns orders that contain at least one item from the authenticated vendor's products.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, processing, shipped, delivered, cancelled]
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Vendor order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/vendor/dashboard/stats:
    get:
      tags: [Vendor — Orders]
      summary: Vendor dashboard stats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vendor-specific sales and order statistics
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/vendor/orders/{id}:
    get:
      tags: [Vendor — Orders]
      summary: Get vendor order by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Order details scoped to the vendor's items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/vendor/orders/{id}/accept:
    put:
      tags: [Vendor — Orders]
      summary: Accept a confirmed order
      description: Transitions the order from `confirmed` → `processing`. Triggers a customer notification.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Order accepted
        '400':
          description: Order not in confirmed status
          content:
            application/json:
              example: { error: Order must be in confirmed status to accept, currentStatus: pending }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/vendor/orders/{id}/ship:
    put:
      tags: [Vendor — Orders]
      summary: Mark order as shipped
      description: Transitions `processing` → `shipped`, creates tracking record, and notifies the customer.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipOrderRequest'
            example:
              carrier: DHL
              trackingNumber: 1234567890
              trackingUrl: "https://track.dhl.com/1234567890"
              estimatedDelivery: "2026-05-12"
      responses:
        '200':
          description: Order shipped
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/vendor/orders/{id}/deliver:
    put:
      tags: [Vendor — Orders]
      summary: Mark order as delivered
      description: Transitions `shipped` → `delivered`. Sends delivery confirmation to customer.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Order marked as delivered
        '400':
          description: Order not in shipped status
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/vendor/orders/{id}/tracking:
    put:
      tags: [Vendor — Orders]
      summary: Update tracking information
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrackingRequest'
            example:
              currentLocation: Nairobi Sorting Centre
              trackingStatus: in_transit
      responses:
        '200':
          description: Tracking updated
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/vendor/orders/{id}/notes:
    post:
      tags: [Vendor — Orders]
      summary: Add vendor note to order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorNoteRequest'
      responses:
        '201':
          description: Note added
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

components:
  schemas:
    ShipOrderRequest:
      type: object
      required: [carrier, trackingNumber]
      properties:
        carrier:           { type: string, minLength: 2 }
        trackingNumber:    { type: string, minLength: 2 }
        trackingUrl:       { type: string, format: uri }
        estimatedDelivery: { type: string, format: date }

    UpdateTrackingRequest:
      type: object
      minProperties: 1
      properties:
        currentLocation:   { type: string }
        trackingStatus:
          type: string
          enum: [pending, in_transit, out_for_delivery, delivered, failed]
        estimatedDelivery: { type: string, format: date }

    VendorNoteRequest:
      type: object
      required: [content]
      properties:
        content:             { type: string, minLength: 1, maxLength: 1000 }
        isVisibleToCustomer: { type: boolean, default: true }

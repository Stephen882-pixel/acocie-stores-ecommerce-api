services:

 
  db:
    image: postgres:16-alpine
    container_name: acocie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB:       ${DB_NAME:-acocie_stores}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-acocie_stores}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - acocie_net

  #
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: acocie_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-production}
      PORT:        ${PORT:-5000}

      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-acocie_stores}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES:  ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}

      EMAIL_HOST:     ${EMAIL_HOST:-}
      EMAIL_PORT:     ${EMAIL_PORT:-587}
      EMAIL_USER:     ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM:     ${EMAIL_FROM:-noreply@acocie.com}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    networks:
      - acocie_net

volumes:
  postgres_data:
    driver: local

networks:
  acocie_net:
    driver: bridge

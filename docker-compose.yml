services:
  db:
    image: postgres:16-alpine
    container_name: acocie_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-acocie_stores}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5436:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-acocie_stores}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - acocie_net


  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: acocie_api
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5002}

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-acocie_stores}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}

      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@acocie.com}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}

    ports:
      - "${PORT:-5002}:${PORT:-5002}"

    networks:
      - acocie_net


  pgadmin:
    image: dpage/pgadmin4
    container_name: acocie_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@acocie.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

    networks:
      - acocie_net


volumes:
  postgres_data:
    driver: local


networks:
  acocie_net:
    driver: bridge